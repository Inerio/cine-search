# Load .env file (project root or backend root)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

server.port=8080

# TMDB API Configuration
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.image-base-url=https://image.tmdb.org/t/p

# Groq LLM Configuration
groq.api.key=${GROQ_API_KEY}
groq.api.base-url=https://api.groq.com/openai/v1

# LLM Settings (overridable via ENV)
app.llm.model=${LLM_MODEL:llama-3.3-70b-versatile}
app.llm.temperature=${LLM_TEMPERATURE:0.1}
app.llm.max-tokens=${LLM_MAX_TOKENS:400}
app.llm.system-prompt=${LLM_SYSTEM_PROMPT:}

# CORS
cors.allowed-origins=http://localhost:4200

# Cache
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m
